<!DOCTYPE html>
<html>
<head>
    <title>My First Webpage</title>
    <style>
        body{
            text-align: center;
        }
        button{
            background-color: yellow;
            color: red;
        }
    </style>
</head>
<body>
    <h1>Email Spam Classifier</h1>
    <div>
        <form method = "POST" action="/predict">
            <textarea rows="15" cols="35" name="email-content" placeholder="Enter Your Email"
                autocomplete="off">{{ email_text }}</textarea>
            <div>
                <button type="submit">Check Spam</button>
                <a href="/">Reset</a>
            </div>
        </form>
    </div>
    <div>
        {% if predictions==1 %}
            <h2 id="display">SPAM</h2>
        {% elif predictions==-1 %}
            <h2 id="display">NOT SPAM</h2>
        {% endif %}
    </div>
</body>
</html>
